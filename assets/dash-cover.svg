<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1520"/>
      <stop offset="45%" stop-color="#111d2b"/>
      <stop offset="100%" stop-color="#162636"/>
    </linearGradient>
    <linearGradient id="mesh" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a52" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#142030" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0c1520" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="78%" cy="32%" r="42%">
      <stop offset="0%" stop-color="#2d4a62" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0c1520" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0"/>
      <stop offset="25%" stop-color="#cbd5e1" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#e2e8f0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e5c4b" stop-opacity="0"/>
      <stop offset="40%" stop-color="#2d7a62" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e5c4b" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.65" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.75"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1440" height="280" fill="url(#bg)"/>
  <rect width="1440" height="280" fill="url(#mesh)"/>
  <rect width="1440" height="280" fill="url(#orb)"/>
  <rect width="1440" height="280" fill="url(#dots)"/>
  <rect width="1440" height="280" fill="url(#grid)"/>

  <!-- Abstract soft shapes (right side, decorative) -->
  <ellipse cx="1180" cy="95" rx="140" ry="90" fill="#1e3a52" fill-opacity="0.12" filter="url(#blur)"/>
  <ellipse cx="1050" cy="160" rx="100" ry="60" fill="#1e5c4b" fill-opacity="0.06" filter="url(#blur)"/>

  <!-- Secondary chart line (very subtle) -->
  <path d="M520 195 Q680 175 820 185 T1100 155 T1320 140" fill="none" stroke="url(#chartLine)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Primary chart line -->
  <path d="M480 210 L600 168 L720 182 L840 142 L960 158 L1080 118 L1200 132 L1320 98" fill="none" stroke="url(#chartLine)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Accent trend (green, single highlight) -->
  <path d="M840 142 L960 158 L1080 118 L1200 132" fill="none" stroke="url(#accentLine)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Area fill under chart -->
  <path d="M480 210 L600 168 L720 182 L840 142 L960 158 L1080 118 L1200 132 L1320 98 L1320 280 L480 280 Z" fill="#ffffff" fill-opacity="0.015"/>

  <!-- Mini bar chart (abstract KPI) -->
  <g opacity="0.45" transform="translate(1090, 52)">
    <rect x="0" y="38" width="7" height="22" rx="2" fill="#64748b" fill-opacity="0.35"/>
    <rect x="14" y="28" width="7" height="32" rx="2" fill="#94a3b8" fill-opacity="0.3"/>
    <rect x="28" y="18" width="7" height="42" rx="2" fill="#cbd5e1" fill-opacity="0.28"/>
    <rect x="42" y="8" width="7" height="52" rx="2" fill="#1e5c4b" fill-opacity="0.5"/>
    <rect x="56" y="22" width="7" height="38" rx="2" fill="#94a3b8" fill-opacity="0.25"/>
  </g>

  <!-- Light financial icons -->
  <g opacity="0.12" stroke="#e2e8f0" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="1260" cy="200" r="22"/>
    <path d="M1260 188v24M1252 196h16"/>
    <rect x="1220" y="178" width="28" height="20" rx="4"/>
    <path d="M1226 188h16"/>
  </g>

  <!-- Bottom edge soften -->
  <rect x="0" y="240" width="1440" height="40" fill="url(#bg)" fill-opacity="0.35"/>
</svg>
